version: '3.8'

services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: openclaw/gateway:2026.4.1-beta.2
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "18789:18789"
    environment:
      - NODE_ENV=production
      - OPENCLAW_VERSION=2026.4.1-beta.2
      - PORT=18789
      # 环境变量配置 (从 .env 文件加载)
      - TZ=Asia/Shanghai
    volumes:
      - openclaw-data:/root/.openclaw
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:18789/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - openclaw-network

  # Redis 缓存服务 (可选)
  redis:
    image: redis:alpine
    container_name: openclaw-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - openclaw-network

volumes:
  openclaw-data:
    driver: local
  redis-data:
    driver: local

networks:
  openclaw-network:
    driver: bridge
